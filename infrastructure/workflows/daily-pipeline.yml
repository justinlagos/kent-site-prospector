# Copy to .github/workflows/ when hosting on GitHub Actions.
name: KSP daily pipeline
on:
  schedule:
    - cron: "30 5 * * 1-5"   # 05:30 UTC ≈ 06:30 BST, weekdays
  workflow_dispatch: {}
concurrency:
  group: ksp-daily
  cancel-in-progress: false
jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm --filter @ksp/database run migrate:deploy
        env: { DATABASE_URL: "${{ secrets.DATABASE_URL }}" }
      - run: node apps/worker/dist/main.js --job daily
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Full production env comes from repository secrets — see .env.example
          AGENCY_NAME: ${{ secrets.AGENCY_NAME }}
          AGENCY_WEBSITE: ${{ secrets.AGENCY_WEBSITE }}
          AGENCY_PHONE: ${{ secrets.AGENCY_PHONE }}
          AGENCY_POSTAL_ADDRESS: ${{ secrets.AGENCY_POSTAL_ADDRESS }}
          AGENCY_SENDER_NAME: ${{ secrets.AGENCY_SENDER_NAME }}
          AGENCY_SENDER_EMAIL: ${{ secrets.AGENCY_SENDER_EMAIL }}
          AGENCY_REPLY_TO_EMAIL: ${{ secrets.AGENCY_REPLY_TO_EMAIL }}
          DIRECTORY_ADAPTER: real
          REGISTRY_ADAPTER: real
          EMAIL_VALIDATION_ADAPTER: real
          LLM_ADAPTER: real
          DEPLOY_ADAPTER: real
          EMAIL_PROVIDER_ADAPTER: real
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          EMAIL_VALIDATION_API_KEY: ${{ secrets.EMAIL_VALIDATION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN }}
          POSTMARK_WEBHOOK_TOKEN: ${{ secrets.POSTMARK_WEBHOOK_TOKEN }}
          EMAIL_DRY_RUN: ${{ vars.EMAIL_DRY_RUN }}
          EMAIL_DOMAIN_AUTH_CONFIRMED: ${{ vars.EMAIL_DOMAIN_AUTH_CONFIRMED }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          UNSUBSCRIBE_HMAC_SECRET: ${{ secrets.UNSUBSCRIBE_HMAC_SECRET }}
          DASHBOARD_BASE_URL: ${{ vars.DASHBOARD_BASE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
